<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=210mm, user-scalable=no">
  <title>Özdemir Motors - Mobil Fix</title>
  <style>
    /* Temel Sıfırlama */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    
    body {
      background-color: #444;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    /* Kağıdı mobilde düzgün göstermek için dış kapsayıcı */
    .outer-container {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 20px 0;
      overflow-x: auto;
    }

    .paper {
      width: 210mm;
      height: 297mm;
      min-width: 210mm;
      min-height: 297mm;
      background-image: url('resimresim.jpg');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-color: white;
      position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      /* Mobilde ekran görüntüsündeki gibi dağılmaması için */
      transform-origin: top center;
    }

    /* Mobilde çok büyük durmaması için ekran ölçeği */
    @media screen and (max-width: 500px) {
      .paper {
        transform: scale(0.45); /* Ekran genişliğine göre ayarlanabilir */
        margin-bottom: -150mm; /* Boşluğu kapatmak için */
      }
    }

    input {
      position: absolute;
      border: none;
      background: rgba(0, 123, 255, 0.05);
      font-size: 14px;
      padding: 0 5px;
      outline: none;
    }

    /* Koordinatlar (Tam olarak görselinize göre) */
    .tarih { top: 34px; left: 615px; width: 132px; height: 25px; text-align: center; }
    .plaka { top: 67px; left: 615px; width: 132px; height: 25px; text-align: center; font-weight: bold; }
    .marka { top: 100px; left: 615px; width: 132px; height: 25px; text-align: center; }
    .km { top: 132px; left: 615px; width: 132px; height: 25px; text-align: center; }
    .sonraki { top: 164px; left: 615px; width: 132px; height: 25px; text-align: center; }
    .ad { top: 210px; left: 125px; width: 350px; height: 26px; }
    .tel { top: 210px; left: 565px; width: 185px; height: 26px; }
    .row-desc { left: 45px; width: 570px; height: 25px; }
    .row-price { left: 625px; width: 140px; height: 25px; text-align: right; padding-right: 15px; font-weight: bold; }
    
    .total-area { left: 570px; width: 145px; height: 26px; text-align: right; padding-right: 15px; font-weight: bold; }
    .f-total { top: 976px; }
    .f-tahsil { top: 1004px; }
    .f-kalan { top: 1033px; color: red; }

    /* Butonlar */
    .nav { position: fixed; bottom: 20px; display: flex; gap: 10px; z-index: 1000; }
    button { padding: 12px 25px; cursor: pointer; border-radius: 50px; border: none; color: white; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .print-btn { background-color: #28a745; }
    .clear-btn { background-color: #dc3545; }

    /* YAZDIRMA AYARLARI */
    @media print {
      @page { size: A4; margin: 0; }
      body { background: white; }
      .nav { display: none; }
      .outer-container { padding: 0; margin: 0; display: block; }
      .paper { 
        box-shadow: none; 
        transform: none !important; 
        margin: 0 !important;
        position: fixed;
        top: 0;
        left: 0;
      }
      input { background: transparent !important; }
    }
  </style>
</head>
<body>

  <div class="outer-container">
    <div class="paper">
      <input type="text" class="tarih" id="tarih">
      <input type="text" class="plaka" placeholder="PLAKA">
      <input type="text" class="marka" placeholder="MARKA/MODEL">
      <input type="text" class="km" placeholder="KM">
      <input type="text" class="sonraki" placeholder="GELECEK BAKIM">
      <input type="text" class="ad" placeholder="Müşteri Adı Soyadı">
      <input type="text" class="tel" placeholder="Telefon">
      <div id="dynamic-lines"></div>
      <input type="text" class="total-area f-total" id="toplam" placeholder="0.00" oninput="setManual('toplam')">
      <input type="text" class="total-area f-tahsil" id="tahsil" placeholder="0.00" inputmode="decimal" oninput="calculate()">
      <input type="text" class="total-area f-kalan" id="kalan" placeholder="0.00" oninput="setManual('kalan')">
    </div>
  </div>

  <div class="nav">
    <button class="print-btn" onclick="window.print()">YAZDIR / PDF</button>
    <button class="clear-btn" onclick="if(confirm('Temizlensin mi?')) location.reload()">TEMİZLE</button>
  </div>

  <script>
    const startY = 250.5;
    const gap = 31.61;
    const lineContainer = document.getElementById('dynamic-lines');
    let isManualTotal = false;
    let isManualKalan = false;

    for (let i = 0; i < 23; i++) {
      const topPos = startY + (i * gap);
      const desc = document.createElement('input');
      desc.className = 'row-desc';
      desc.style.top = topPos + 'px';
      desc.placeholder = (i+1) + ". İşlem";
      lineContainer.appendChild(desc);

      const price = document.createElement('input');
      price.className = 'row-price price-in';
      price.type = 'text';
      price.inputmode = 'decimal';
      price.style.top = topPos + 'px';
      price.oninput = calculate;
      lineContainer.appendChild(price);
    }

    function setManual(id) {
      const val = document.getElementById(id).value;
      if (id === 'toplam') isManualTotal = val.length > 0;
      if (id === 'kalan') isManualKalan = val.length > 0;
      calculate();
    }

    function calculate() {
      let sum = 0;
      document.querySelectorAll('.price-in').forEach(input => {
        let val = input.value.replace(',', '.');
        sum += parseFloat(val) || 0;
      });
      const tahsilVal = parseFloat(document.getElementById('tahsil').value.replace(',', '.')) || 0;
      if (!isManualTotal) document.getElementById('toplam').value = sum > 0 ? sum.toFixed(2) : "";
      if (!isManualKalan) {
        const currentTotal = isManualTotal ? parseFloat(document.getElementById('toplam').value.replace(',', '.')) || 0 : sum;
        const netKalan = currentTotal - tahsilVal;
        document.getElementById('kalan').value = netKalan !== 0 ? netKalan.toFixed(2) : "";
      }
    }

    window.onload = () => { document.getElementById('tarih').value = new Date().toLocaleDateString('tr-TR'); };
  </script>
</body>
</html>
